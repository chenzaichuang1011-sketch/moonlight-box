                    'lieshu': roleData.lieshu_cultivation || otherInfo.iExptSki5 || 0,
                };
                const personCultMaxMap = {
                    'attack': roleData.max_attack_cultivation || 0,
                    'defense': roleData.max_defense_cultivation || 0,
                    'magic': roleData.max_magic_cultivation || 0,
                    'resist': roleData.max_resist_cultivation || 0,
                    'lieshu': roleData.max_lieshu_cultivation || 0,
                };
                for (const [key, val] of Object.entries(personCultDetails)) {
                    if (val > 0) {
                        const lvl = personCultLevelMap[key] || 0;
                        const max = personCultMaxMap[key] || '?';
                        items.push({ 
                            category: 'cultivation',
                            key: 'person_' + key,
                            icon: personCultIcons[key] || '⚔️',
                            label: personCultLabels[key] || key,
                            sub: `${lvl}/${max}`,
                            value: val
                        });
                    }
                }
                
                // ========== 宠物修炼子项 ==========
                const petCultDetails = bd.cultivation?.pet?.details || {};
                const petCultIcons = { 'attack': '⚔️', 'defense': '🛡️', 'magic': '✨', 'resist': '🌈' };
                const petCultLabels = { 'attack': '宠攻修炼', 'defense': '宠防修炼', 'magic': '宠法修炼', 'resist': '宠抗修炼' };
                const petCultLevelMap = {
                    'attack': roleData.pet_attack_control || otherInfo.iBeastSki1 || 0,
                    'defense': roleData.pet_defense_control || otherInfo.iBeastSki2 || 0,
                    'magic': roleData.pet_magic_control || otherInfo.iBeastSki3 || 0,
                    'resist': roleData.pet_resistance_control || otherInfo.iBeastSki4 || 0,
                };
                for (const [key, val] of Object.entries(petCultDetails)) {
                    if (val > 0) {
                        const lvl = petCultLevelMap[key] || 0;
                        items.push({ 
                            category: 'cultivation',
                            key: 'pet_' + key,
                            icon: petCultIcons[key] || '🐾',
                            label: petCultLabels[key] || key,
                            sub: `${lvl}/25`,
                            value: val
                        });
                    }
                }
                
                // ========== 师门技能子项 ==========
                const masterItems = bd.skills?.master?.items || [];
                const masterSkillList = roleData.master_skills || [];
                for (const item of masterItems) {
                    if (item.value > 0) {
                        const src = masterSkillList.find(s => s.name === item.name) || {};
                        items.push({ 
                            category: 'skills',
                            key: 'master_' + item.name,
                            icon: '📖',
                            label: item.name,
                            sub: `${item.level || src.level || 0} 级`,
                            value: item.value
                        });
                    }
                }
                
                // ========== 生活技能子项 ==========
                const lifeItems = bd.skills?.life?.items || [];
                const lifeSkillList = roleData.life_skills || [];
                for (const item of lifeItems) {
                    if (item.value > 0) {
                        const src = lifeSkillList.find(s => s.name === item.name) || {};
                        items.push({ 
                            category: 'skills',
                            key: 'life_' + item.name,
                            icon: '🌿',
                            label: item.name,
                            sub: `${item.level || src.level || 0} 级`,
                            value: item.value
                        });
                    }
                }
                
                // ========== 外观子项 ==========
                if (bd.appearance?.mount > 0) {
                    const mountCount = (roleData.mounts || []).length;
                    items.push({ category: 'appearance', key: 'mount', icon: '🏇', label: '坐骑', sub: `${mountCount} 匹`, value: bd.appearance.mount });
                }
                const clothesItems = bd.appearance?.clothes?.items || [];
                const clothesList = roleData.clothes_list || [];
                for (const item of clothesItems) {
                    if (item.value > 0) {
                        const src = clothesList.find(c => c.name === item.name) || {};
                        const rarity = src.rarity || 1;
                        items.push({ 
                            category: 'appearance',
                            key: 'clothes_' + item.name, 
                            icon: '👔', 
                            label: item.name,
                            sub: rarity > 1 ? '限定' : '普通',
                            value: item.value
                        });
                    }
                }
                const xiangruiItems = bd.appearance?.xiangrui?.items || [];
                const xiangruiList = roleData.xiangrui_list || [];
                for (const item of xiangruiItems) {
                    if (item.value > 0) {
                        const src = xiangruiList.find(x => x.name === item.name) || {};
                        const rarity = src.rarity || 1;
                        items.push({ 
                            category: 'appearance',
                            key: 'xiangrui_' + item.name, 
                            icon: '🦚', 
                            label: item.name,
                            sub: rarity > 1 ? '限量' : '普通',
                            value: item.value
                        });
                    }
                }
                const spellItems = bd.appearance?.spell_effects?.items || [];
                for (const item of spellItems) {
                    if (item.value > 0) {
                        items.push({ 
                            category: 'appearance',
                            key: 'spell_' + item.name,
                            icon: '✨', 
                            label: item.name,
                            sub: '',
                            value: item.value
                        });
                    }
                }
                
                // ========== 装备子项 ==========
                const equipItems = bd.equipment?.items || [];
                const equipList = roleData.equip_list || [];
                for (const item of equipItems) {
                    if (item.value > 0) {
                        const src = equipList.find(e => e.name === item.name) || {};
                        const refine = src.refine_level || 0;
                        items.push({ 
                            category: 'equipment',
                            key: 'equip_' + item.name, 
                            icon: '🛡️', 
                            label: item.name,
                            sub: refine > 0 ? `+${refine}` : '',
                            value: item.value
                        });
                    }
                }
                
                // ========== 召唤兽子项 ==========
                const petItems = bd.pets?.items || [];
                const petList = roleData.pet_list || [];
                for (const item of petItems) {
                    if (item.value > 0) {
                        const src = petList.find(p => p.name === item.name) || {};
                        items.push({ 
                            category: 'pets',
                            key: 'pet_' + item.name, 
                            icon: '🐉', 
                            label: item.name,
                            sub: `${src.level || 0} 级 | ${src.skill_count || 0} 技能`,
                            value: item.value
                        });
                    }
                }
                
                return items;
            },
            // 大分类汇总（供饼图使用）
            breakdownItems() {
                if (!this.evaluation?.breakdown) return [];
                const bd = this.evaluation.breakdown;
                const items = [];
                
                // 角色属性
                if (bd.role_attr?.total > 0) {
                    items.push({ key: 'role_attr', icon: '💎', label: '角色属性', value: bd.role_attr.total });
                }
                // 法宝
                if (bd.fabao?.total > 0) {
                    items.push({ key: 'fabao', icon: '🔮', label: '法宝', value: bd.fabao.total });
                }
                // 修炼系统
                if (bd.cultivation?.total > 0) {
                    items.push({ key: 'cultivation', icon: '⚔️', label: '修炼系统', value: bd.cultivation.total });
                }
                // 技能系统
                if (bd.skills?.total > 0) {
                    items.push({ key: 'skills', icon: '📖', label: '技能系统', value: bd.skills.total });
                }
                // 外观系统
                if (bd.appearance?.total > 0) {
                    items.push({ key: 'appearance', icon: '🦚', label: '外观系统', value: bd.appearance.total });
                }
                // 装备系统
                if (bd.equipment?.total > 0) {
                    items.push({ key: 'equipment', icon: '🛡️', label: '装备系统', value: bd.equipment.total });
                }
                // 召唤兽
                if (bd.pets?.total > 0) {
                    items.push({ key: 'pets', icon: '🐉', label: '召唤兽', value: bd.pets.total });
                }
                
                return items;
            },
            breakdownItems() {
                // 返回所有分类项（供饼图使用）- 角色属性展开为子项
                const items = [];
                if (!this.evaluation?.breakdown) return items;
                const bd = this.evaluation.breakdown;
                
                // 人物修炼（合并为一项）
                if (bd.cultivation?.person?.total) {
                    items.push({ key: 'person', icon: '⚔️', label: '人物修炼', value: bd.cultivation.person.total });
                }
                
                // 宠物修炼（合并为一项）
                if (bd.cultivation?.pet?.total) {
                    items.push({ key: 'pet', icon: '🐾', label: '宠修炼', value: bd.cultivation.pet.total });
                }
                
                // 角色属性子项（展开显示）
                const roleAttrDetails = bd.role_attr?.details || {};
                const roleAttrIcons = {
                    '转职': '🔱', '机缘': '🌟', '乾元丹': '💫', '储备金': '💰',
                    '历史门派': '🏛️', '保留属性': '💎', '召唤兽扩展栏': '🐾',
                    '仙玉': '✨', '灵宝': '⚡'
                };
                for (const [key, val] of Object.entries(roleAttrDetails)) {
                    if (val > 0) {
                        items.push({ 
                            key: 'attr_' + key, 
                            icon: roleAttrIcons[key] || '💎', 
                            label: key, 
                            value: val 
                        });
                    }
                }
                
                // 其他项
                if (bd.fabao?.total) {
                    items.push({ key: 'fabao', icon: '🔮', label: '法宝', value: bd.fabao.total });
                }
                if (bd.skills?.master?.total) {
                    items.push({ key: 'master', icon: '📖', label: '师门技能', value: bd.skills.master.total });
                }
                if (bd.appearance?.mount) {
                    items.push({ key: 'mount', icon: '🏇', label: '坐骑', value: bd.appearance.mount });
                }
                if (bd.appearance?.clothes?.total) {
                    items.push({ key: 'clothes', icon: '👔', label: '锦衣', value: bd.appearance.clothes.total });
                }
                if (bd.appearance?.xiangrui?.total) {
                    items.push({ key: 'xiangrui', icon: '🦚', label: '祥瑞', value: bd.appearance.xiangrui.total });
                }
                if (bd.equipment?.total) {
                    items.push({ key: 'equip', icon: '🛡️', label: '装备', value: bd.equipment.total });
                }
                if (bd.pets?.total) {
                    items.push({ key: 'pets', icon: '🐉', label: '召唤兽', value: bd.pets.total });
                }
                
                return items;
            },
            hasChartData() {
                return this.breakdownItems.some(i => i.value > 0);
            },
            chartItems() {
                const colors = ['#f0c040','#1890ff','#52c41a','#b37feb','#ff7875','#ffa940','#36cfc9','#ff85c2','#d3f261','#69c0ff'];
                const items = this.breakdownItems.filter(i => i.value > 0);
                const total = items.reduce((s, i) => s + i.value, 0);
                return items.map((item, idx) => ({
                    ...item,
                    color: colors[idx % colors.length],
                    pct: total > 0 ? ((item.value / total) * 100).toFixed(1) : '0',
                }));
            },
        },
        async mounted() {
            if (this.$route.query.url) {
                this.url = this.$route.query.url;
            }
            // 优先从 record_id 获取本地已有数据
            if (this.$route.query.record_id) {
                await this.fetchFromRecord(this.$route.query.record_id);
            } else if (this.url) {
                await this.fetch();
            }
        },
        methods: {
            formatPrice(v) {
                if (!v && v !== 0) return '-';
                v = Number(v);
                return v >= 10000 ? (v / 10000).toFixed(1) + '万' : (v || 0).toFixed(0);
            },
            getErrorLineStyle(line) {
                if (line && line.startsWith && (line.startsWith('💡') || line.startsWith('   '))) {
                    return 'color:var(--text-secondary);font-size:12px;margin-top:4px';
                }
                return 'font-weight:600';
            },
            async fetchFromRecord(recordId) {
                // 从本地数据库获取已有数据
                this.loading = true;
                this.error = '';
                this.roleData = null;
                this.evaluation = null;
                this.parseResult = null;
                if (this.chart) { this.chart.dispose(); this.chart = null; }
                try {
                    const apiUrl = API + '/api/monitor/records/' + recordId + '/detail';
                    const r = await axios.get(apiUrl);
                    if (r.data.raw_role_data && r.data.raw_evaluation) {
                        // 将原始数据转换为前端期望的格式
                        const raw = r.data.raw_role_data;
                        const other = raw.other_info || {};
                        this.roleData = {
                            ...raw,
                            // 角色名称
                            role_name: other.cName || raw.seller_nickname || '未知角色',
                            // 等级
                            level: other.iGrade || raw.level || 0,
                            // 门派名称
                            school: raw.equip_name || this.schoolMap[other.iSchool] || '未知门派',
                            // 服务器
                            server_name: raw.server_name || '未知服务器',
                            // 售价（转换为元）
                            selling_price: r.data.selling_price || (raw.price ? raw.price / 100 : 0),
                            // 转职信息
                            zhuan_zhi: other.iZhuanZhi ? this.zzMap[other.iZhuanZhi] || 'normal' : 'normal',
                            // 修炼信息
                            attack_cultivation: other.iExptSki1 || 0,
                            defense_cultivation: other.iExptSki2 || 0,
                            magic_cultivation: other.iExptSki3 || 0,
                            resist_cultivation: other.iExptSki4 || 0,
                            lieshu_cultivation: other.iExptSki5 || 0,
                            pet_attack_control: other.iBeastSki1 || 0,
                            pet_defense_control: other.iBeastSki2 || 0,
                            pet_magic_control: other.iBeastSki3 || 0,
                            pet_resistance_control: other.iBeastSki4 || 0,
                            // 辅助信息
                            jiyuan: other.iGoodEvent || 0,
                            qianyuan_dan: other.iQianYuanDan || 0,
                            renqi: other.iRenQi || 0,
                            qiannengguo: other.iQianNengGuo || 0,
                            xianyu: other.xianyu || 0,
                            goodness: other.iGoodness || 0,
                        };
                        this.evaluation = r.data.raw_evaluation;
                        // 从 evaluation 提取 breakdown 用于饼图
                        if (r.data.evaluation_breakdown) {
                            this.evaluation.breakdown = r.data.evaluation_breakdown;
                        }
                        this.$nextTick(() => this.renderChart());
                    } else {
                        // 本地数据不足，回退到从 CBG API 获取
                        this.error = '本地数据不完整，将尝试从藏宝阁获取...';
                        await this.fetch();
                    }
                } catch(e) {
                    // 获取失败，回退到从 CBG API 获取
                    this.error = '无法获取本地数据，将尝试从藏宝阁获取...';
                    await this.fetch();
                }
                this.loading = false;
            },
            onUrlInput(val) {
                // 防抖 600ms 检测
                if (this._urlCheckTimer) clearTimeout(this._urlCheckTimer);
                if (!val || !val.trim()) { this.urlHint = null; return; }
                this._urlCheckTimer = setTimeout(() => this.checkUrl(val.trim()), 600);
            },
            onUrlPaste(e) {
                // 粘贴时立即检测（等 DOM 更新后获取最新值）
                setTimeout(() => {
                    const v = this.url.trim();
                    if (v) this.checkUrl(v);
                }, 50);
            },
            async checkUrl(url) {
                try {
                    const r = await axios.get(API + '/api/crawl/test-url', { params: { url } });
                    this.urlHint = r.data;
                } catch(e) {
                    this.urlHint = null;
                }
            },
            async fetch() {
                if (!this.url.trim()) { this.error = '请输入链接'; return; }
                this.loading = true; this.error = ''; this.roleData = null; this.evaluation = null; this.parseResult = null;
                if (this.chart) { this.chart.dispose(); this.chart = null; }
                try {
                    const r = await axios.get(API + '/api/crawl/parse-url', { params: { url: this.url } });
                    this.parseResult = r.data;
                } catch(e) {
                    this.error = '无法解析链接，请确认是藏宝阁角色链接';
                    this.loading = false; return;
                }
                try {
                    const r = await axios.post(API + '/api/crawl/evaluate-from-url', { url: this.url });
                    if (r.data.success) {
                        this.roleData = r.data.role_data;
                        this.evaluation = r.data.evaluation;
                        this.$nextTick(() => this.renderChart());
                    } else {
                        this.error = r.data.error || '采集失败';
                    }
                } catch(e) {
                    const detail = e.response?.data?.detail;
                    if (typeof detail === 'string') {
                        // 智能提示：分类错误类型
                        if (detail.includes('商品信息已过期') || detail.includes('已下架')) {
                            this.error = '❌ 该角色已下架或售出\n💡 提示：链接中的角色已不在售，请换一个当前在售的角色链接';
                        } else if (detail.includes('登录') || detail.includes('Cookie') || detail.includes('登录')) {
                            this.error = '⚠️ 账号登录已过期\n💡 请到「首页」重新扫码登录后重试';
                        } else {
                            this.error = detail;
                        }
                    } else {
                        this.error = e.message || '请求失败，请检查网络';
                    }
                }
                this.loading = false;
            },
            async saveRole() {
                if (!this.url.trim() || this.saving) return;
                this.saving = true;
                try {
                    const r = await axios.post(API + '/api/crawl/fetch-and-save', { url: this.url.trim() });
                    if (r.data.success) {
                        ElMessage.success('✅ 已保存到「已采集角色」');
                    } else {
                        ElMessage.error(r.data.error || '保存失败');
                    }
                } catch(e) {
                    ElMessage.error(e.response?.data?.detail || '保存请求失败');
                }
                this.saving = false;
            },
            renderChart() {
                if (!this.$refs.chartEl || !this.hasChartData) return;
                if (this.chart) this.chart.dispose();
                this.chart = echarts.init(this.$refs.chartEl, 'dark');
                const data = this.chartItems.map(i => ({ value: i.value, name: i.label, itemStyle: { color: i.color } }));
                this.chart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'item',
                        formatter: (p) => '<b>' + p.name + '</b><br/>¥' + p.value.toLocaleString() + '<br/>' + p.percent.toFixed(1) + '%'
                    },
                    series: [{
                        type: 'pie',
                        radius: ['42%', '72%'],
                        center: ['50%', '50%'],
                        data,
                        label: { show: false },
                        emphasis: {
                            itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.5)' }
                        },
                    }]
                });
            },
        },
        beforeUnmount() {
            if (this.chart) { this.chart.dispose(); this.chart = null; }
        },
    };

    // ============ 路由 ============
    const routes = [
        { path: '/', component: HomePage },
        { path: '/crawl', component: CrawlPage },
        { path: '/monitor', component: MonitorPage },
    ];
    const router = VueRouter.createRouter({ routes, history: VueRouter.createWebHashHistory() });

    // ============ 应用 ============
    const app = Vue.createApp({
        data() { return { sidebarCollapsed: false }; }
    });
    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
    app.use(router);
    app.mount('#app');
    </script>
</body>
</html>
